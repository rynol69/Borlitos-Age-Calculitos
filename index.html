<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borlitos Age Calculitos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-box">

    <h2>⏰ Borlitos Age <span>Calculitos</span></h2>

    <label>Date of Birth:</label>
    <input type="date" id="dob">

    <label>Age at the Date of:</label>
    <input type="date" id="targetDate">

    <button onclick="calculateAge()">Calculate My Age! ➜</button>

    <div class="result-box" id="resultBox">
        <p class="small">You are ...</p>
        <p class="age" id="result">--</p>
        <p class="small">Congrats!</p>
    </div>

    <p class="error" id="error"></p>

</div>

<script src="script.js"></script>
</body>
</html>
